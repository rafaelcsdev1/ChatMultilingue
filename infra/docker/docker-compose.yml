version: '3.9'
services:
  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile.frontend
    ports:
      - '5173:5173'
    volumes:
      - ../../frontend:/app
    command: npm run dev

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile.backend
    ports:
      - '4000:4000'
    volumes:
      - ../../backend:/app
    command: npm run dev
